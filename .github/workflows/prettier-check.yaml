name: Prettier Check

on:
  push:

jobs:
  prettier-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get changed YAML files
        id: changed
        run: |
          git fetch --all

          BASE=$(git rev-parse HEAD^ 2>/dev/null || echo "${{ github.event.before }}")
          HEAD="${{ github.sha }}"

          echo "Diff base: $BASE"
          echo "Head: $HEAD"

          FILES=$(git diff --name-only --diff-filter=ACMR $BASE $HEAD \
            | grep -E '\.(yaml|yml)$' || true)

          echo "Changed files:"
          echo "$FILES"

          {
            echo "files<<EOF"
            echo "$FILES"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Run Prettier check
        if: steps.changed.outputs.files != ''
        run: |
          echo "${{ steps.changed.outputs.files }}" | tr '\n' ' ' | xargs npx prettier --check
